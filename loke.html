<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You Animation</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            background-color: white;
            width: 350px;
            height: 350px;
            border-radius: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        #heart-container {
            position: relative;
            width: 100%;
            height: 250px;
            margin-top: 20px;
        }

        .small-heart {
            position: absolute;
            font-size: 14px;
            color: #e91e63;
            opacity: 0;
            transform: scale(0);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .message {
            color: #e91e63;
            font-size: 24px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 1s forwards;
            animation-delay: 4.5s;
        }

        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div id="heart-container"></div>
        <h1 class="message">I Love You</h1>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById("heart-container");
            const totalHearts = 90;

            for (let i = 0; i < totalHearts; i++) {
                const heart = document.createElement("div");
                heart.classList.add("small-heart");
                heart.innerHTML = "❤️";

                const t = (i / totalHearts) * Math.PI * 2;

                const scale = 7;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

                const centerX = 165;
                const centerY = 100;

                heart.style.left = `${centerX + x * scale}px`;
                heart.style.top = `${centerY + y * scale}px`;

                heart.style.animationDelay = `${i * 0.05}s`;

                container.appendChild(heart);
            }
        });
    </script>

</body>

</html>
